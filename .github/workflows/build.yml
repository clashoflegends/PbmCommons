name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Install local deps
        run: mvn install:install-file -Dfile=lib/PbmPersistenceCommons.jar -DgroupId=com.clashoflegends -DartifactId=PbmPersistenceCommons -Dversion=0.1.0-SNAPSHOT -Dpackaging=jar -q
      - name: Build JAR
        run: mvn --batch-mode package
