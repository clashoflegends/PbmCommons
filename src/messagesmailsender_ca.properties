BODY.MISSING.ORDERS=La data l\u00edmit de ({0} 11pm UTC / 23:00 GMT) \u00e9s d'aqu\u00ed a dos dies...\n\n{1} - T{2} - {3}\n\nPots consultar l'estat de les teves ordres i les teves partides a Les meves partides al nostre lloc web: http://clashlegends.com/\n\nSi us plau, envia les teves ordres perqu\u00e8 tothom pugui gaudir d'una gran experi\u00e8ncia. Torna a enviar-les si est\u00e0s rebent aquest missatge, ja que podr\u00edem haver-les extraviat o no haver-les rebut.\nDe deb\u00f2 que no vols esperar fins a l'\u00faltim minut per enviar les teves ordres, alguna cosa dolenta passar\u00e0 just a l'\u00faltim minut...\nFes-nos saber si tens cap problema o si no tens previst enviar les teves ordres.\n\n{4}\nDiverteix-te!\n\nGM Team\nS'agraeix qualsevol comentari.\nhttp://clashlegends.com/\nhttps://www.facebook.com/clash.legends\n
