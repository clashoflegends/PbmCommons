BODY.MISSING.ORDERS=La scadenza ({0} 11pm UTC / 23:00 GMT) \u00e8 tra due giorni...\n\n{1} - T{2} - {3}\n\nPuoi controllare lo stato dei tuoi ordini e le tue partite nella sezione My Games del nostro sito: http://clashlegends.com/\n\nTi preghiamo di inviare i tuoi ordini cos\u00ec che tutti possano vivere una bella esperienza. Inviali di nuovo se stai ricevendo questo messaggio, poich\u00e9 potremmo averli smarriti o non averli ricevuti.\n\u00c8 meglio non aspettare fino all'ultimo minuto per inviare i tuoi ordini, altrimenti qualcosa di brutto accadr\u00e0 proprio all'ultimo minuto...\nFacci sapere se stai riscontrando problemi o se non intendi inviare i tuoi ordini.\n\n{4}\nBuon divertimento!\n\nGM Team\nOgni feedback \u00e8 apprezzato.\nhttp://clashlegends.com/\nhttps://www.facebook.com/clash.legends\n
