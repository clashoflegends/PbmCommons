BODY.SINGLE.PLAYER.RESEND=Ecco di nuovo il tuo turno, rispedito su tua richiesta o da un moderatore.\n\n{0} - T{1} - {2}\nI tuoi prossimi ordini sono attesi entro il {3}.\n\nContinua a mandarci i tuoi commenti...\n\nGM Team\nAdoriamo il tuo parere.\nwww.clashlegends.com\nwww.facebook.com/clash.legends
BODY.GAME.RESULTS.SEND={0} - T{1} - {2}\nI risultati del tuo turno sono pronti. Il file game*.rr.egf allegato si apre nel Counselor.\n\nI tuoi prossimi ordini sono attesi entro il {3}. I risultati arrivano qualche ora dopo la scadenza, salvo imprevisti.\n\nInvia in anticipo se puoi - invia direttamente dal Counselor e saprai che il Judge ha ricevuto il tuo turno. Prima arriva, meno probabilit\u00e0 c'\u00e8 che qualcosa vada storto all'ultimo momento.\n\nE tieni il Counselor sempre aggiornato - un rapido controllo prima di ogni turno vale la pena.\n\n{4}\n\nGM Team\nAdoriamo il tuo parere.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n
BODY.GAME.RESULTS.GAMEOVER=La partita {0} \u00e8 terminata dopo {1} turni!\n{0} - T{1} - {2}\nGrazie per aver giocato. Prenditi un momento per condividere con il GM e con gli altri giocatori le tue impressioni, sulla partita, sulle statistiche finali, su qualsiasi cosa. Il foglio di calcolo con le statistiche \u00e8 allegato; si vede al meglio in Excel, dove le barre dei dati vengono rese correttamente.\n\nC'\u00e8 qualcos'altro che ti piacerebbe vedere nelle statistiche? Diccelo.\n\nE va' a congratularti con i tuoi rivali e alleati, poi parla della tua partita sui social. Aiuta pi\u00f9 persone a scoprire Clash of Legends e porta forze fresche alla prossima campagna.\n\n{4}\n\nGM Team\nAdoriamo il tuo parere.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n
BODY.GAME.RESULTS.PLAYEROVER={0} - T{1} - {2}\nLa tua nazione \u00e8 caduta al turno {1}. Il file game*.rr.egf allegato mostra come si \u00e8 conclusa la tua storia.\n\nGrazie per aver giocato, {2}. Ogni campagna insegna qualcosa, e la tua ha plasmato questa partita per tutti coloro che vi hanno preso parte. Speriamo che tornerai a giocare: c'\u00e8 sempre un'altra nazione, un altro scenario, un'altra partita che sta per cominciare.\n\nPrenditi un momento per condividere con il GM e con gli altri giocatori le tue impressioni, e guarda come si svolge il resto della partita.\n\n{4}\n\nGM Team\nAdoriamo il tuo parere.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n
BODY.GAME.RESULTS.GAMESTART.WDO=Benvenuto in Clash of Legends, {2}!\n\nLa partita {0} \u00e8 iniziata, e i tuoi primi ordini sono attesi entro il {3}.\n\nQuesta \u00e8 una partita a squadre settimanale sullo scenario War of Dwarves and Orcs di Tolkien, limitata a {5} turni per {6} giocatori, con Pacchetti Iniziali personalizzati. Termina quando viene soddisfatta una condizione di vittoria o quando sono trascorsi {5} turni.\n\nPacchetti Iniziali personalizzati: ogni nazione pu\u00f2 spendere 90 Punti iniziali dall'elenco disponibile. Se la tua selezione non \u00e8 valida, il Judge sceglie per te dei pacchetti casuali. La maggior parte dei pacchetti non \u00e8 cumulabile - di solito si applica il bonus migliore.\n\n==== Benvenuto nella beta di WDO ====\nStai giocando alla prima beta del nostro nuovo scenario, War of Dwarves and Orcs di Tolkien, ambientato intorno al 2973. Molte cose qui sono diverse, e te le segnaleremo man mano.\n\nLa prima cosa che noterai \u00e8 la disposizione iniziale. Ogni partita comincia con un mix diverso di nazioni (su 37) e posizioni di partenza uniche - in questa variante qualsiasi nazione pu\u00f2 scegliere qualsiasi punto di partenza. In aggiunta, il Judge distribuisce circa 200 oggetti magici presi da circa 1000 disponibili. Le scelte del tuo Pacchetto Iniziale si trovano sotto le schede Nazioni, insieme agli ordini della tua nazione.\n\nNoterai anche che usiamo ancora le vecchie icone degli eserciti. Cambieranno non appena troveremo un designer che ne crei 37 nuove.\n\nSe la tua nazione non ha ancora nomi tolkieniani, \u00e8 perch\u00e9 ne stiamo ancora scegliendo alcuni. Teniamo traccia della creazione dei nomi qui: https://docs.google.com/spreadsheets/d/1ZiMV-CrsM1KFQCgI76jIsqjCs0Gr9nK-QdOnfk7myXY/edit?usp=sharing\n\nGrandi cambiamenti nelle meccaniche da tenere d'occhio:\n-Combattimento e movimento sono un'unica fase. Il combattimento si risolve pi\u00f9 avanti nel turno, come parte del movimento.\n-L'economia \u00e8 molto pi\u00f9 semplice. Le nazioni non possono pi\u00f9 essere eliminate solo per non aver pagato il mantenimento, ma le truppe non pagate si sciolgono, e tasse pi\u00f9 alte ti costano lealt\u00e0.\n-Anche le citt\u00e0 possono ricevere ordini - costruire strade, gestire le tasse, e altro ancora.\n-Ogni personaggio condivide lo stesso set di abilit\u00e0. Sono tutti Comandanti/Agenti multipli con accesso a ogni ordine da PG (esclusi ovviamente gli ordini di citt\u00e0 e di nazione).\n-Niente movimento in acqua, niente navi.\n-E altro ancora.\n\nGli incontri e gli NPC sono ancora pochi in questa fase. Il tuo parere, unito al ritmo pi\u00f9 lento di questo scenario, ci aiuter\u00e0 ad aggiungerne molti altri.\n\nQuesta \u00e8 una grande novit\u00e0 rispetto ai nostri altri scenari, quindi \u00e8 previsto che qualcosa vada storto (va bene, non proprio previsto - ma succeder\u00e0, ne sono certo). Segnala tutto ci\u00f2 che sembra fuori posto. Ci aiuta a schiacciare i bug e ad affinare le regole e le FAQ per le prossime partite. Tieni d'occhio l'equilibrio mentre giochi; i tuoi suggerimenti metteranno a punto lo scenario per tutti coloro che verranno dopo.\n\nIl piano prevede molte varianti lungo il percorso - una con posizioni di partenza bloccate per una maggiore fedelt\u00e0 ai libri, combinazioni di nazioni diverse, numeri di giocatori diversi. Per ora, concentriamoci su questa.\n=========\n\nLa tua prima mossa:\n-Apri il file game*.rr.egf allegato nel Counselor. Il Counselor \u00e8 anche dove scrivi i tuoi ordini e li invii al Judge.\n-Quando i tuoi ordini sono pronti, inviali direttamente dal Counselor. Se qualcosa va storto, puoi caricare il file order*.rc.egf sul nostro sito web.\n-IMPORTANTE: order*.rc.egf \u00e8 l'unico formato che possiamo accettare. I turni in qualsiasi altro formato non verranno elaborati.\n\nPreparati (5 minuti):\n-Iscriviti alla maillist degli annunci per i cambiamenti alle regole e le discussioni tra giocatori: https://groups.google.com/forum/#!forum/clashoflegends\n-Seguici su Facebook per vedere curiosit\u00e0, conoscere altri giocatori e aiutare la community a crescere (ci aiuta anche a individuare gli account falsi): https://www.facebook.com/clash.legends\n-Scarica il Counselor dal sito web (avrai bisogno di Java installato), e prendi il foglio di riferimento del Giocatore e le regole dello Scenario dalla stessa pagina.\n-Sei nuovo qui? Comincia da https://wiki.clashlegends.com/beginners e dalle FAQ su https://wiki.clashlegends.com/faq\n\nOgni scenario \u00e8 diverso - classi, azioni, mappe, truppe, tutto quanto. Non dare mai per scontato che uno scenario si giochi come un altro.\n\nCerchiamo di non rieseguire i turni, e riduciamo al minimo le modifiche. Fidati del giudizio del GM team, anche quando una decisione sembra ingiusta.\n\nAlcune cose che fanno vincere le partite:\n-Le truppe sono uniche per ogni nazione e combattono in modo diverso su ogni terreno. 1000 fanti perdono contro 1000 cavalieri in pianura ma vincono facilmente in montagna. Recluta pensando al terreno.\n-Le classi possono sembrare quelle di altri scenari, ma non lo sono. Impara cosa pu\u00f2 fare ciascuna.\n-Reagisci agli NPC con azioni normali, non speciali. Seguili, offri oggetti magici, fuggi... il loro comportamento dipende da molte cose: le relazioni tra le nazioni, la classe del tuo personaggio, se le mura sono abbattute, e altro ancora.\n-Uccidi il comandante di un esercito e l'esercito non si scioglie - diventa una guarnigione. Una guarnigione mantiene la posizione e non si muove n\u00e9 recluta finch\u00e9 un nuovo comandante non ne prende il controllo.\n-Il mercato \u00e8 inaffidabile. Non contare sul riuscire a ottenere tutto ci\u00f2 che cerchi di comprare.\n-Leggi i poteri, i costi e le peculiarit\u00e0 di ogni truppa. Sono davvero diverse.\n-In combattimento, le tattiche che scegli decidono quali truppe cadono per prime. Controlla le tabelle alla fine del PDF delle regole o nel Counselor.\n-Il Counselor filtra le azioni mostrando quelle che sembrano valide all'inizio del turno, quindi combinazioni come "crea un esercito e poi marcia" sono nascoste per impostazione predefinita. Spunta la casella "ALL" per disattivare i filtri e vedere ogni azione.\n\nGioca sui punti di forza della tua nazione, e dicci cosa ne pensi. Il gioco si evolve a ogni tornata, e il parere dei giocatori guida quei cambiamenti.\n\nSoprattutto, divertiti. Gioca quante partite vuoi, anche pi\u00f9 nazioni nella stessa partita (a parte alcune modalit\u00e0 come il death match). Una cosa da sapere: saltare il primo turno, o mancare pi\u00f9 di un turno in una settimana senza avvisare i GM, ti fa finire in timeout e pu\u00f2 affidare la tua nazione a un altro giocatore o all'IA. Quindi continua a mandare i tuoi ordini.\n\nBenvenuto nella beta, e buona fortuna.\n\n{4}\n\nGM Team\nAdoriamo il tuo parere.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n
BODY.GAME.RESULTS.GAMESTART.GENERIC=Benvenuto in Clash of Legends, {2}!\n\nLa partita {0} \u00e8 iniziata. La tua nazione \u00e8 sulla mappa, i tuoi rivali stanno gi\u00e0 osservando, e i tuoi primi ordini sono attesi entro il {3}.\n\nQuesta \u00e8 una partita di {5} turni per {6} giocatori. Termina quando viene soddisfatta una condizione di vittoria o quando sono trascorsi {5} turni. Ogni ordine che invii plasma la storia, quindi fa' che contino.\n\nSe questa partita usa Pacchetti Iniziali personalizzati, ogni nazione pu\u00f2 spendere 90 Punti iniziali dall'elenco disponibile. Se la tua selezione non \u00e8 valida, il Judge sceglie per te dei pacchetti casuali. La maggior parte dei pacchetti non \u00e8 cumulabile - di solito si applica il bonus migliore.\n\nLa tua prima mossa:\n-Apri il file game*.rr.egf allegato nel Counselor. Il Counselor \u00e8 anche dove scrivi i tuoi ordini e li invii al Judge.\n-Quando i tuoi ordini sono pronti, inviali direttamente dal Counselor. Se qualcosa va storto, allega il file order*.rc.egf a un messaggio e invialo a noi (non alla maillist).\n-IMPORTANTE: order*.rc.egf \u00e8 l'unico formato che possiamo accettare. I turni in qualsiasi altro formato non verranno elaborati.\n\nPreparati (5 minuti):\n-Iscriviti alla maillist degli annunci per i cambiamenti alle regole e le discussioni tra giocatori: https://groups.google.com/forum/#!forum/clashoflegends\n-Seguici su Facebook per vedere curiosit\u00e0, conoscere altri giocatori e aiutare la community a crescere: https://www.facebook.com/clash.legends\n-Scarica il Counselor dal sito web (avrai bisogno di Java installato), e prendi il foglio di riferimento del Giocatore e le regole dello Scenario dalla stessa pagina.\n-Sei nuovo qui? Comincia da https://wiki.clashlegends.com/beginners e dalle FAQ su https://wiki.clashlegends.com/faq\n\nOgni scenario \u00e8 diverso - classi, azioni, mappe, truppe, tutto quanto. Non dare mai per scontato che uno scenario si giochi come un altro.\n\nCerchiamo di non rieseguire i turni, e riduciamo al minimo le modifiche. Fidati del giudizio del GM team, anche quando una decisione sembra ingiusta.\n\nAlcune cose che fanno vincere le partite:\n-Le truppe sono uniche per ogni nazione e combattono in modo diverso su ogni terreno. 1000 fanti perdono contro 1000 cavalieri in pianura ma vincono facilmente in montagna. Recluta pensando al terreno.\n-Le classi non sono intercambiabili. I Comandanti costruiscono accampamenti e gestiscono la maggior parte delle azioni di citt\u00e0 ed esercito. Gli Emissari sono molto pi\u00f9 che semplici messaggeri - sono centrali per gestire la tua nazione e raccogliere informazioni.\n-Reagisci agli NPC con azioni normali, non speciali. Seguili, offri oggetti magici, fuggi... il loro comportamento dipende da molte cose: le relazioni tra le nazioni, la classe del tuo personaggio, se le mura sono abbattute, e altro ancora.\n-Uccidi il comandante di un esercito e l'esercito di solito diventa una guarnigione (si scioglie solo nel Greek Battles). Una guarnigione mantiene la posizione e non si muove n\u00e9 recluta finch\u00e9 un nuovo comandante non ne prende il controllo.\n-Il mercato \u00e8 inaffidabile. Non contare sul riuscire a ottenere tutto ci\u00f2 che cerchi di comprare.\n-Muovere la tua flotta all'attacco richiama automaticamente le tue navi - non c'\u00e8 bisogno di imbarcarle prima.\n-Leggi i poteri, i costi e le peculiarit\u00e0 di ogni truppa. Sono davvero diverse.\n-In combattimento, le tattiche che scegli decidono quali truppe cadono per prime. Controlla le tabelle alla fine del PDF delle regole.\n-Il Counselor filtra le azioni mostrando quelle che sembrano valide all'inizio del turno, quindi combinazioni come "crea un esercito e poi marcia" sono nascoste per impostazione predefinita. Spunta la casella "ALL" per disattivare i filtri e vedere ogni azione.\n\nGioca sui punti di forza della tua nazione, e dicci cosa ne pensi. Il gioco si evolve a ogni tornata, e il parere dei giocatori guida quei cambiamenti.\n\nSoprattutto, divertiti. Gioca quante partite vuoi, anche pi\u00f9 nazioni nella stessa partita (a parte alcune modalit\u00e0 come il death match). Una cosa da sapere: saltare il primo turno, o mancare pi\u00f9 di un turno in una settimana senza avvisare i GM, ti fa finire in timeout e pu\u00f2 affidare la tua nazione a un altro giocatore o all'IA. Quindi continua a mandare i tuoi ordini.\n\nBenvenuto a bordo, e buona fortuna.\n\n{4}\n\nGM Team\nAdoriamo il tuo parere.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n\n
