BODY.PDF.OPTIN.NOTE=PS: il PDF del turno \u00e8 ora facoltativo ed \u00e8 disattivato per impostazione predefinita, quindi questa email include solo il file game*.rr.egf. Vuoi anche il PDF? Attivalo alla voce "Risultati del turno" in La mia configurazione: http://clashlegends.com/PbmSite/p_myconfig.php
