BODY.MISSING.ORDERS=O prazo de ({0} 11pm UTC / 23:00 GMT) termina em dois dias...\n\n{1} - T{2} - {3}\n\nVoc\u00ea pode verificar o status das suas ordens e seus jogos em Meus Jogos no nosso site: http://clashlegends.com/\n\nPor favor, envie suas ordens para que todos tenham uma \u00f3tima experi\u00eancia. Envie-as novamente caso esteja recebendo esta mensagem, pois podemos t\u00ea-las perdido ou n\u00e3o recebido.\nVoc\u00ea realmente n\u00e3o vai querer deixar para enviar suas ordens no \u00faltimo minuto, algo ruim sempre acontece bem na \u00faltima hora...\nAvise-nos se estiver enfrentando algum problema ou se n\u00e3o pretende enviar suas ordens.\n\n{4}\nDivirta-se!\n\nGM Team\nTodo feedback \u00e9 bem-vindo.\nhttp://clashlegends.com/\nhttps://www.facebook.com/clash.legends\n
