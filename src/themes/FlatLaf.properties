# FlatLaf overrides applied to every FlatLaf theme, loaded via
# Application.installLookAndFeel -> FlatLaf.registerCustomDefaultsSource("themes").
# Theme-specific accents live in FlatLightLaf.properties / FlatDarkLaf.properties (loaded after
# this file, so they win). The brand navy reads well on light but is too dark to accent a dark
# surface, so the dark theme uses a lightened brand tint instead.
