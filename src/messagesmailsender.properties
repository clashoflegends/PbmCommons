BODY.SINGLE.PLAYER.RESEND=Here is your turn again, re-sent at your request or by a moderator.\n\n{0} - T{1} - {2}\nYour next orders are due by {3}.\n\nKeep the comments coming...\n\nGM Team\nWe love your feedback.\nwww.clashlegends.com\nwww.facebook.com/clash.legends
BODY.GAME.RESULTS.SEND={0} - T{1} - {2}\nYour turn results are in. The attached game*.rr.egf opens in the Counselor.\n\nYour next orders are due by {3}. Results follow a few hours after the deadline, barring surprises.\n\nSend early if you can - submit straight from the Counselor and you will know the Judge has your turn. The earlier it arrives, the less chance anything goes wrong at the wire.\n\nAnd keep the Counselor up to date - a quick check before each turn is worth it.\n\n{4}\n\nGM Team\nWe love your feedback.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n
BODY.GAME.RESULTS.GAMEOVER=Game {0} is over after {1} turns!\n{0} - T{1} - {2}\nThank you for playing. Take a moment to send the GM and your fellow players your thoughts, on the game, the final stats, anything at all. The stats spreadsheet is attached; it looks best in Excel, where the data bars render properly.\n\nAnything else you would like to see in the stats? Tell us.\n\nAnd go congratulate your rivals and allies, then post about your game on social media. It helps more people discover Clash of Legends and brings fresh blood to the next campaign.\n\n{4}\n\nGM Team\nWe love your feedback.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n
BODY.GAME.RESULTS.PLAYEROVER={0} - T{1} - {2}\nYour nation has fallen on turn {1}. The attached game*.rr.egf shows how the story ended for you.\n\nThank you for playing, {2}. Every campaign teaches something, and yours shaped this game for everyone in it. We hope you will jump back in: there is always another nation, another scenario, another game starting soon.\n\nTake a moment to send the GM and your fellow players your thoughts, and watch how the rest of the game unfolds.\n\n{4}\n\nGM Team\nWe love your feedback.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n
BODY.GAME.RESULTS.GAMESTART.WDO=Welcome to Clash of Legends, {2}!\n\nGame {0} has begun, and your first orders are due by {3}.\n\nThis is a weekly team game on Tolkien's War of Dwarves and Orcs scenario, limited to {5} turns for {6} players, with custom startup packages. It ends when a victory condition is met or {5} turns have passed.\n\nCustom startup packages: each nation may spend 90 points from the available list. If your selection is not valid, the Judge picks random packages for you. Most packages do not stack - usually the best bonus applies.\n\n==== Welcome to the WDO beta ====\nYou are playing the first beta of our new scenario, Tolkien's War of Dwarves and Orcs, circa 2973. A lot is different here, and we will flag it as we go.\n\nThe first thing you will notice is the setup. Every game starts with a different mix of nations (out of 37) and unique starting locations - any nation can pick any start in this variant. On top of that, the Judge seeds roughly 200 magic items drawn from about 1000 available. Your startup package choices live under the Nations tabs, alongside your nation orders.\n\nYou will also spot that we still use the old army icons. Those will change once we find a designer to create 37 new ones.\n\nIf your nation did not get Tolkien names yet, it is because we are still choosing a few. We track name creation here: https://docs.google.com/spreadsheets/d/1ZiMV-CrsM1KFQCgI76jIsqjCs0Gr9nK-QdOnfk7myXY/edit?usp=sharing\n\nBig mechanics changes to watch:\n-Combat and movement are one milestone. Combat resolves later in the turn, as part of movement.\n-Economy is much simpler. Nations can no longer be eliminated just for failing upkeep, but unpaid troops disband, and higher taxes cost you loyalty.\n-Cities can take orders too - build roads, manage taxes, and more.\n-Every character shares the same skill set. They are all multi commander/rogues with access to every PC order (city and nation orders excepted, of course).\n-No water movement, no ships.\n-And more.\n\nEncounters and NPCs are still few at this stage. Your feedback, combined with this scenario's slower pace, will help us add many more.\n\nThis is a big departure from our other scenarios, so things are meant to go wrong (alright, not meant to - but they will, I am sure). Report anything that looks off. It helps us squash bugs and sharpen the rules and FAQs for the next games. Keep an eye on balance as you play; your suggestions will tune the scenario for everyone who follows.\n\nThe plan is many variants down the road - one with locked starting positions for higher fidelity to the books, different nation combos, different player counts. For now, let's focus on this one.\n=========\n\nYour first move:\n-Open the attached game*.rr.egf in the Counselor. The Counselor is also where you write your orders and send them to the Judge.\n-When your orders are ready, submit them straight from the Counselor. If anything goes wrong, you can upload the order*.rc.egf file on our website.\n-IMPORTANT: order*.rc.egf is the only format we can accept. Turns in any other format will not be processed.\n\nGet set up (5 minutes):\n-Join the announcements maillist for rule changes and player discussion: https://groups.google.com/forum/#!forum/clashoflegends\n-Follow us on Facebook to see trivia, meet other players, and help the community grow (it also helps us spot fake accounts): https://www.facebook.com/clash.legends\n-Download the Counselor from the website (you will need Java installed), and grab the Player reference sheet and Scenario rules from the same page.\n-New here? Start with https://wiki.clashlegends.com/beginners and the FAQ at https://wiki.clashlegends.com/faq\n\nEvery scenario is different - classes, actions, maps, troops, all of it. Never assume one scenario plays like another.\n\nWe try not to re-run turns, and we keep edits to a minimum. Trust the GM team's judgment, even when a call seems unfair.\n\nA few things that win games:\n-Troops are unique to each nation and fight differently on each terrain. 1000 infantry lose to 1000 cavalry on plains but win easily in the mountains. Recruit with the ground in mind.\n-The classes may look like those in other scenarios, but they are not. Learn what each one can do.\n-You react to NPCs with normal actions, not special ones. Follow them, offer magic items, flee... their behavior depends on many things: relations between nations, your character's class, whether a wall is down, and more.\n-Kill an army's commander and the army does not disband - it becomes a garrison. A garrison holds position and will not move or recruit until a new commander takes over.\n-The market is unreliable. Do not count on getting everything you try to buy.\n-Read each troop's powers, costs, and quirks. They really are different.\n-In combat, your chosen tactics decide which troops fall first. Check the tables at the end of the rules PDF or in the Counselor.\n-The Counselor filters actions to what looks valid at the start of the turn, so combos like "create an army then march it" are hidden by default. Tick the "ALL" box to switch the filters off and see every action.\n\nPlay to your nation's strengths, and tell us what you think. The game evolves with every round, and player feedback drives those changes.\n\nAbove all, have fun. Play as many games as you like, even multiple nations in the same game (a few modes like death match aside). One thing to know: skipping your first turn, or missing more than one turn in a week without a word to the GMs, puts you in timeout and may hand your nation to another player or the AI. So keep your orders coming.\n\nWelcome to the beta, and good luck.\n\n{4}\n\nGM Team\nWe love your feedback.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n
BODY.GAME.RESULTS.GAMESTART.GENERIC=Welcome to Clash of Legends, {2}!\n\nGame {0} has begun. Your nation is on the map, your rivals are already watching, and your first orders are due by {3}.\n\nThis is a {5}-turn game for {6} players. It ends when a victory condition is met or {5} turns have passed. Every order you send shapes the story, so make them count.\n\nIf this game uses custom startup packages, each nation may spend 90 points from the available list. If your selection is not valid, the Judge picks random packages for you. Most packages do not stack - usually the best bonus applies.\n\nYour first move:\n-Open the attached game*.rr.egf in the Counselor. The Counselor is also where you write your orders and send them to the Judge.\n-When your orders are ready, submit them straight from the Counselor. If anything goes wrong, attach your order*.rc.egf file to a message and send it to us (not the maillist).\n-IMPORTANT: order*.rc.egf is the only format we can accept. Turns in any other format will not be processed.\n\nGet set up (5 minutes):\n-Join the announcements maillist for rule changes and player discussion: https://groups.google.com/forum/#!forum/clashoflegends\n-Follow us on Facebook to see trivia, meet other players, and help the community grow: https://www.facebook.com/clash.legends\n-Download the Counselor from the website (you will need Java installed), and grab the Player reference sheet and Scenario rules from the same page.\n-New here? Start with https://wiki.clashlegends.com/beginners and the FAQ at https://wiki.clashlegends.com/faq\n\nEvery scenario is different - classes, actions, maps, troops, all of it. Never assume one scenario plays like another.\n\nWe try not to re-run turns, and we keep edits to a minimum. Trust the GM team's judgment, even when a call seems unfair.\n\nA few things that win games:\n-Troops are unique to each nation and fight differently on each terrain. 1000 infantry lose to 1000 cavalry on plains but win easily in the mountains. Recruit with the ground in mind.\n-Classes are not interchangeable. Commanders build camps and run most city and army actions. Diplomats are far more than messengers - they are central to managing your nation and gathering intelligence.\n-You react to NPCs with normal actions, not special ones. Follow them, offer magic items, flee... their behavior depends on many things: relations between nations, your character's class, whether a wall is down, and more.\n-Kill an army's commander and the army usually becomes a garrison (it disbands only in Greek Battles). A garrison holds position and will not move or recruit until a new commander takes over.\n-The market is unreliable. Do not count on getting everything you try to buy.\n-Moving your navy to attack pulls in your ships automatically - no need to board them first.\n-Read each troop's powers, costs, and quirks. They really are different.\n-In combat, your chosen tactics decide which troops fall first. Check the tables at the end of the rules PDF.\n-The Counselor filters actions to what looks valid at the start of the turn, so combos like "create an army then march it" are hidden by default. Tick the "ALL" box to switch the filters off and see every action.\n\nPlay to your nation's strengths, and tell us what you think. The game evolves with every round, and player feedback drives those changes.\n\nAbove all, have fun. Play as many games as you like, even multiple nations in the same game (a few modes like death match aside). One thing to know: skipping your first turn, or missing more than one turn in a week without a word to the GMs, puts you in timeout and may hand your nation to another player or the AI. So keep your orders coming.\n\nWelcome aboard, and good luck.\n\n{4}\n\nGM Team\nWe love your feedback.\nwww.clashlegends.com\nwww.facebook.com/clash.legends\n\n
