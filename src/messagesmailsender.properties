BODY.MISSING.ORDERS=The deadline of ({0} 11pm UTC / 23:00 GMT) is in two days...\n\n{1} - T{2} - {3}\n\nYou can check your orders status and your games under My Games in our website: http://clashlegends.com/\n\nPlease, submit your orders so everyone can have a great experience. Submit them again if you are receiving this message, as we could have misplaced or not received it.\nYou really do not want to wait until the last minute to submit your orders, something bad will happen at the very last minute...\nLet us know if you are having any problems or if you do not plan to submit your orders.\n\n{4}\nHave fun!\n\nGM Team\nAll feedback is appreciated.\nhttp://clashlegends.com/\nhttps://www.facebook.com/clash.legends\n
